spring.application.name=AUTH-SERVICE
server.port=8081

spring.datasource.url=jdbc:mysql://mysql:3306/trust_pay_db
spring.datasource.username=Karthik
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Eureka client configuration
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

# Register service using IP address instead of hostname 
eureka.instance.prefer-ip-address=true

# Custom instance ID (useful when running multiple instances on same machine)
eureka.instance.instance-id=${spring.application.name}:${server.port}


management.server.port=${server.port}
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true


jwt.secret=MySuperSecretKeyForJwtAuthService1234567890