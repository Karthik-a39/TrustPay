services:

  #####################################################
  # EUREKA SERVER
  #####################################################

  eureka-server:
    build:
      context: ./Eureka-Server
    container_name: eureka-server
    restart: unless-stopped

    ports:
      - "8761:8761"

    networks:
      - trust-pay-network

    healthcheck:
      test: ["CMD-SHELL","wget --spider -q http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10



  #####################################################
  # MYSQL
  #####################################################

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: trustpay
      MYSQL_USER: Karthik
      MYSQL_PASSWORD: 1234

    ports:
      - "3307:3306"

    networks:
      - trust-pay-network

    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 10



  #####################################################
  # ZOOKEEPER
  #####################################################

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

    ports:
      - "2181:2181"

    networks:
      - trust-pay-network



  #####################################################
  # KAFKA
  #####################################################

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped

    depends_on:
      zookeeper:
        condition: service_started

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    networks:
      - trust-pay-network

    healthcheck:
      test: ["CMD-SHELL","kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10



  #####################################################
  # AUTH SERVICE
  #####################################################

  auth-service:
    build:
      context: ./AuthService

    container_name: auth-service
    restart: unless-stopped

    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy

    ports:
      - "8081:8081"
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/trustpay
      SPRING_DATASOURCE_USERNAME: Karthik
      SPRING_DATASOURCE_PASSWORD: 1234

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka

    networks:
      - trust-pay-network

    healthcheck:
      test: ["CMD-SHELL","wget --spider -q http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10



  #####################################################
  # ACCOUNT SERVICE
  #####################################################

  account-service:
    build:
      context: ./AccoutService

    container_name: account-service
    restart: unless-stopped

    depends_on:
      auth-service:
        condition: service_healthy

    ports:
      - "8082:8082"

    volumes:
      - mysql_data:/var/lib/mysql

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/trustpay
      SPRING_DATASOURCE_USERNAME: Karthik
      SPRING_DATASOURCE_PASSWORD: 1234

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka

    networks:
      - trust-pay-network

    healthcheck:
      test: ["CMD-SHELL","wget --spider -q http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10



  #####################################################
  # NOTIFICATION SERVICE
  #####################################################

  notification-service:
    build:
      context: ./notification-service

    container_name: notification-service
    restart: unless-stopped

    depends_on:
      kafka:
        condition: service_healthy

    ports:
      - "8083:8083"

    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka

      TRUSTPAY_EMAIL: ${TRUSTPAY_EMAIL}
      TRUSTPAY_PASSWORD: ${TRUSTPAY_PASSWORD}
      TRUSTPAY_FROM_EMAIL: ${TRUSTPAY_FROM_EMAIL}

    networks:
      - trust-pay-network

    healthcheck:
      test: ["CMD-SHELL","wget --spider -q http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10



  #####################################################
  # API GATEWAY
  #####################################################

  api-gateway:
    build:
      context: ./ApiGateway

    container_name: api-gateway
    restart: unless-stopped

    depends_on:
      auth-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy

    ports:
      - "9090:9090"

    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka

    networks:
      - trust-pay-network

    healthcheck:
      test: ["CMD-SHELL","wget --spider -q http://localhost:9090/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10



#####################################################
# NETWORK
#####################################################

networks:
  trust-pay-network:
    driver: bridge

volumes:
  mysql_data :