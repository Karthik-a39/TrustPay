server.port=9090
spring.application.name=API-GATEWAY

# Eureka client configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Register service using IP address instead of hostname
eureka.instance.prefer-ip-address=true

# Custom instance ID (useful when running multiple instances on same machine)
eureka.instance.instance-id=${spring.application.name}:${server.port}


# Gateway Routes (properties format)
spring.cloud.gateway.server.webflux.routes[0].id=AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/** 

spring.cloud.gateway.server.webflux.routes[1].id=ACCOUNT-SERVICE
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/account/** 

spring.cloud.gateway.server.webflux.routes[2].id=TEST-SERVICE
spring.cloud.gateway.server.webflux.routes[2].uri=lb://TEST-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/test/** 

jwt.secret=MySuperSecretKeyForJwtAuthService1234567890